<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>tclhs — Account Settings</title>
  <link rel="stylesheet" href="theme.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <style>
    .settings-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .alert {
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .alert-success { background: #1a3a2a; color: #6ee7a0; border: 1px solid #2a5a3e; }
    .alert-error   { background: #3a1a1a; color: #f87171; border: 1px solid #5a2a2a; }
    .avatar-upload-wrap { display: flex; align-items: center; gap: 1.5rem; }
    .avatar-upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text);
      background: transparent;
      transition: border-color var(--transition);
    }
    .avatar-upload-btn:hover { border-color: var(--btn); color: var(--btn); }
    #photo-file-input { display: none; }
    .type-toggle {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .type-toggle-btn {
      padding: 0.45rem 1.1rem;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      font-size: 0.875rem;
      font-family: var(--font);
      font-weight: 500;
      cursor: pointer;
      color: var(--text-muted);
      background: transparent;
      transition: border-color var(--transition), color var(--transition), background var(--transition);
    }
    .type-toggle-btn:hover { border-color: var(--btn); color: var(--text); }
    .type-toggle-btn.active {
      border-color: var(--btn);
      background: rgba(224, 82, 82, 0.12);
      color: var(--btn);
    }
    @media (max-width: 520px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="dash-page">

  <header class="dash-header">
    <a href="index.html" class="logo">tclhs</a>
    <nav>
      <!-- DATA: currentUser.role — updated by JS -->
      <a href="student-home.html" id="home-link">Home</a>
      <a href="account-settings.html" class="active">Account</a>
      <a href="login.html">Log out</a>
    </nav>
  </header>

  <main class="dash-main">
    <h1 class="page-title">account settings</h1>

    <div id="alert-success" class="alert alert-success">Changes saved successfully.</div>
    <div id="alert-error"   class="alert alert-error">Something went wrong. Please try again.</div>

    <form id="account-form" action="/api/account/update" method="POST">

      <!-- ── Profile Photo ───────────────────────────────────── -->
      <div class="card mb-3">
        <div class="settings-section-title">Profile Photo</div>
        <div class="avatar-upload-wrap">
          <!-- DATA: user.profilePhotoUrl -->
          <img
            id="avatar-preview"
            src="https://via.placeholder.com/90"
            alt="Profile photo"
            class="avatar"
            data-field="profilePhoto"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
          />
          <div class="avatar-placeholder" style="display:none;">&#128100;</div>
          <div>
            <label for="photo-file-input" class="avatar-upload-btn">
              &#128247; Upload new photo
            </label>
            <input type="file" id="photo-file-input" name="profilePhoto" accept="image/*" onchange="previewPhoto(this)"/>
            <p class="text-sm text-muted mt-1">JPG, PNG, or GIF — max 2 MB</p>
          </div>
        </div>
      </div>

      <!-- ── Personal Info ──────────────────────────────────── -->
      <div class="card mb-3">
        <div class="settings-section-title">Personal Information</div>

        <div class="form-row">
          <!-- DATA: user.firstName -->
          <div class="form-group">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="firstName" class="form-control"
                   placeholder="First name" data-field="firstName" required/>
          </div>
          <!-- DATA: user.lastName -->
          <div class="form-group">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="lastName" class="form-control"
                   placeholder="Last name" data-field="lastName" required/>
          </div>
        </div>

        <!-- DATA: user.email -->
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="@seattleschools.org" data-field="email" required/>
        </div>

        <!-- DATA: student.gradeLevel — hidden for tutors -->
        <div class="form-group" id="grade-level-group">
          <label for="grade-level">Grade Level</label>
          <select id="grade-level" name="gradeLevel" class="form-control" data-field="gradeLevel">
            <option value="">Select grade</option>
            <option value="9">9th Grade</option>
            <option value="10">10th Grade</option>
            <option value="11">11th Grade</option>
            <option value="12">12th Grade</option>
          </select>
        </div>
      </div>

      <!-- ── Account Type ──────────────────────────────────────── -->
      <div class="card mb-3">
        <div class="settings-section-title">Account Type</div>
        <div class="form-group" style="margin-bottom:0;">
          <!-- DATA: user.role — 'student' | 'tutor' | 'both' -->
          <input type="hidden" id="account-type" name="accountType" value="student" data-field="accountType"/>
          <div class="type-toggle">
            <button type="button" class="type-toggle-btn active" id="btn-student" onclick="setAccountType('student')">Student</button>
            <button type="button" class="type-toggle-btn"        id="btn-tutor"   onclick="setAccountType('tutor')">Tutor</button>
            <button type="button" class="type-toggle-btn"        id="btn-both"    onclick="setAccountType('both')">Both</button>
          </div>
        </div>
      </div>

      <!-- ── Change Password ─────────────────────────────────── -->
      <div class="card mb-3">
        <div class="settings-section-title">Change Password</div>

        <div class="form-group">
          <label for="current-password">Current Password</label>
          <input type="password" id="current-password" name="currentPassword" class="form-control"
                 placeholder="Current password" autocomplete="current-password"/>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="new-password">New Password</label>
            <input type="password" id="new-password" name="newPassword" class="form-control"
                   placeholder="New password" autocomplete="new-password"/>
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm New Password</label>
            <input type="password" id="confirm-password" name="confirmPassword" class="form-control"
                   placeholder="Confirm new password" autocomplete="new-password"/>
          </div>
        </div>
        <p class="text-sm text-muted">Leave password fields blank to keep your current password.</p>
      </div>

      <div class="flex gap-2 items-center">
        <button type="submit" class="btn btn-primary" style="width:auto; min-width:160px;">Save Changes</button>
      </div>

    </form>
  </main>

  <script>
    let stompClient = null;

    function connect() {
      const socket = new SockJS('/ws');
      socket.onclose = function () {
        document.body.innerHTML = '';
        const message = document.createElement('div');
        message.textContent = '503: Whoops! Lost connection to the server. Please refresh to try again.';
        message.style.fontSize = '24px';
        message.style.color = 'red';
        message.style.textAlign = 'center';
        message.style.marginTop = '20%';
        document.body.style.background = 'none';
        document.body.appendChild(message);
      };
      stompClient = Stomp.over(socket);
      stompClient.connect({}, function () {
        stompClient.subscribe('/topic/account/settings', function (data) {
          const user = JSON.parse(data.body);
          if (user) populateAccountSettings(user);
        });
        stompClient.send('/app/getAccountSettings', {}, {});
      });
    }

    window.addEventListener('load', function () { connect(); });

    // Usage: populateAccountSettings({ firstName, lastName, email, gradeLevel, role, profilePhotoUrl })
    // role: 'student' | 'tutor' | 'both'
    function populateAccountSettings(user) {
      document.getElementById('first-name').value = user.firstName || '';
      document.getElementById('last-name').value  = user.lastName  || '';
      document.getElementById('email').value      = user.email     || '';

      setAccountType(user.role || 'student');

      if (user.gradeLevel) {
        document.getElementById('grade-level').value = user.gradeLevel;
      }

      if (user.profilePhotoUrl) {
        document.getElementById('avatar-preview').src = user.profilePhotoUrl;
      }
    }

    function setAccountType(type) {
      document.getElementById('account-type').value = type;

      ['student', 'tutor', 'both'].forEach(t => {
        document.getElementById('btn-' + t).classList.toggle('active', t === type);
      });

      document.getElementById('grade-level-group').style.display = 'block';

      if (type === 'tutor') {
        document.getElementById('home-link').href = 'tutor-home.html';
      } else {
        document.getElementById('home-link').href = 'student-home.html';
      }
    }

    function previewPhoto(input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const preview = document.getElementById('avatar-preview');
        preview.src = e.target.result;
        preview.style.display = 'block';
        preview.nextElementSibling.style.display = 'none';
      };
      reader.readAsDataURL(input.files[0]);
    }

    document.getElementById('account-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const newPw  = document.getElementById('new-password').value;
      const confPw = document.getElementById('confirm-password').value;
      if (newPw && newPw !== confPw) {
        showAlert('error', 'New passwords do not match.');
        return;
      }
      // TODO: POST /api/account/update with form data
      // showAlert('success');
    });

    function showAlert(type, msg) {
      document.getElementById('alert-success').style.display = 'none';
      document.getElementById('alert-error').style.display   = 'none';
      if (type === 'success') {
        document.getElementById('alert-success').textContent   = msg || 'Changes saved successfully.';
        document.getElementById('alert-success').style.display = 'block';
      } else {
        document.getElementById('alert-error').textContent   = msg || 'Something went wrong. Please try again.';
        document.getElementById('alert-error').style.display = 'block';
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

  </script>

</body>
</html>
