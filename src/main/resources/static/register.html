<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>tclhs — Register</title>
  <link rel="stylesheet" href="theme.css"/>

  <style>
    .auth-card {
      -webkit-box-shadow:0px 0px 105px 20px rgba(122, 150, 168, 0.9);
-moz-box-shadow: 0px 0px 105px 20px rgba(122, 150, 168,0.9);
box-shadow: 0px 0px 105px 20px rgba(122, 150, 168,0.9);
    }

    canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
  }

  </style>



</head>
<body class="auth-page">
  <canvas id="stars"></canvas>

  <div class="auth-card">
    <h1 class="auth-logo">tclhs</h1>

    <form id="register-form" action="/api/auth/register" method="POST" onsubmit="handleRegister(event)">

      <!-- DATA: newUserEmail -->
      <div class="form-group">
        <input
          type="email"
          id="email"
          name="email"
          class="form-control"
          placeholder="@seattleschools.org"
          data-field="email"
          required
        />
      </div>

      <!-- DATA: newPassword -->
      <div class="form-group">
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          placeholder="New Password"
          data-field="password"
          required
        />
      </div>

      <!-- DATA: confirmPassword -->
      <div class="form-group">
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          class="form-control"
          placeholder="Confirm New Password"
          data-field="confirmPassword"
          required
        />
      </div>

      <div style="margin-top:1.25rem;">
        <button type="button" class="btn btn-primary" onclick="handleRegister(event)">Register</button>
      </div>
      <p id="register-error" style="color:#e05252; margin-top:0.75rem; font-size:0.9rem; display:none;"></p>
    </form>

    <p class="text-center mt-2" style="font-size:0.85rem; color:var(--text-muted);">
      Already have an account? <a href="login.html" class="link">Sign in</a>
    </p>
  </div>




<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 1.5,
    speed: Math.random() * 0.3 + 0.05
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  stars.forEach(star => {
    star.y += star.speed;

    if (star.y > canvas.height) {
      star.y = 0;
      star.x = Math.random() * canvas.width;
    }

    ctx.beginPath();
    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);

    
    ctx.shadowBlur = 10;
    ctx.shadowColor = "white";

    ctx.fillStyle = "white";
    ctx.fill();
  });

  requestAnimationFrame(drawStars);
}

drawStars();

async function handleRegister(event) {
  event.preventDefault();
  const errorEl = document.getElementById('register-error');
  errorEl.style.display = 'none';

  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPassword').value;

  if (!email || !password || !confirm) {
    errorEl.textContent = 'Email and password are required.';
    errorEl.style.display = 'block';
    return;
  }

  if (password !== confirm) {
    errorEl.textContent = 'Passwords do not match.';
    errorEl.style.display = 'block';
    return;
  }

  try {
    const response = await fetch('/api/auth/register', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ email, password })
    });

    if (!response.ok) {
      const errorBody = await response.json().catch(() => null);
      errorEl.textContent = (errorBody && (errorBody.message || errorBody.error)) || 'Registration failed. Please try again.';
      errorEl.style.display = 'block';
      return;
    }

    const data = await response.json();
    localStorage.setItem('tclhsUserId', data.userId);
    window.location.href = 'setup.html';
  } catch (error) {
    errorEl.textContent = 'Unable to connect to the server. Please try again later.';
    errorEl.style.display = 'block';
  }
}

async function redirectIfSignedIn() {
  const userId = localStorage.getItem('tclhsUserId');
  if (!userId) return;
  try {
    const res = await fetch('/api/account/' + userId);
    if (!res.ok) return;
    const body = await res.json();
    if (body && body.name && body.gradeLevel) {
      window.location.href = 'student-home.html';
    } else {
      window.location.href = 'setup.html';
    }
  } catch (error) {
    console.warn('Unable to verify signed-in user', error);
  }
}

window.addEventListener('DOMContentLoaded', redirectIfSignedIn);

</script>

</body>
</html>
