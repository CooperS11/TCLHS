<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>tclhs — Tutor Home</title>
  <link rel="stylesheet" href="theme.css"/>
  <style>
    .tutor-grid {
      display: grid;
      grid-template-columns: 180px 1fr auto;
      gap: 1.5rem;
      align-items: start;
    }
    .tutor-section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }
    .aura-display {
      font-size: 2rem;
      line-height: 1;
    }
    .aura-count {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }
    .request-card {
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .request-card + .request-card { margin-top: 0.75rem; }
    .request-meta { display: flex; gap: 1.25rem; flex-wrap: wrap; font-size: 0.875rem; color: var(--text-muted); }
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
    }
    .badge-pending  { background: #fff3cd; color: #856404; }
    .badge-accepted { background: #d1e7dd; color: #0a3622; }
    .badge-rejected { background: #f8d7da; color: #58151c; }
    @media (max-width: 640px) {
      .tutor-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="dash-page">

  <header class="dash-header">
    <a href="index.html" class="logo">tclhs</a>
    <nav>
      <a href="tutor-home.html" class="active">My Profile</a>
      <a href="login.html">Log out</a>
    </nav>
  </header>

  <main class="dash-main">
    <h1 class="page-title">tutor home page</h1>

    <div class="card">
      <div class="tutor-grid">

        <!-- ── Left: profile photo + bio ── -->
        <div class="flex flex-col items-center gap-2" style="text-align:center;">
          <!-- DATA: tutor.profilePhotoUrl -->
          <img
            src="https://via.placeholder.com/90"
            alt="Profile photo"
            class="avatar"
            data-field="profilePhoto"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
          />
          <div class="avatar-placeholder" style="display:none;">&#128100;</div>

          <div style="margin-top:0.5rem; text-align:left;">
            <div class="tutor-section-label">Bio</div>
            <!-- DATA: tutor.bio -->
            <p class="text-sm" data-field="bio" id="bio-text">[Tutor bio goes here]</p>
            <button class="btn btn-ghost btn-sm mt-1" onclick="editBio()">Edit</button>
          </div>
        </div>

        <!-- ── Center: subjects + availability ── -->
        <div style="display:flex; flex-direction:column; gap:1.25rem;">

          <div>
            <div class="tutor-section-label">Subjects</div>
            <!-- DATA: tutor.courses (list of course names) -->
            <p data-field="subjects" id="subjects-text">[Subject 1, Subject 2, Subject 3]</p>
            <button class="btn btn-ghost btn-sm mt-1" onclick="editSubjects()">Edit</button>
          </div>

          <div>
            <div class="tutor-section-label">Availability</div>
            <!-- DATA: tutor.availability -->
            <p data-field="availability" id="availability-text">[No current availability]</p>
            <button class="btn btn-ghost btn-sm mt-1" onclick="editAvailability()">Edit</button>
          </div>

        </div>

        <!-- ── Right: aura + links ── -->
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:1rem; min-width:140px;">

          <div style="text-align:right;">
            <!-- DATA: tutor.rating (0–5 converted to aura) -->
            <div class="aura-display" id="aura-display" data-field="aura">✨ 0</div>
            <div class="aura-count" data-field="auraCount">aura</div>
            <a href="#" class="link mt-1" style="display:block;">view aura</a>
          </div>

          <a href="#requests-section" class="link" style="font-weight:700;">view student requests</a>

        </div>

      </div>
    </div>

    <!-- ── Session Requests ──────────────────────────────────── -->
    <section id="requests-section" style="margin-top:2rem;">
      <h2 class="page-title" style="margin-bottom:1rem;">Session Requests</h2>

      <div id="requests-empty" class="card" style="color:var(--text-muted); text-align:center; padding:2rem;">
        No pending requests yet.
      </div>

      <div id="requests-list"></div>
    </section>

  </main>

  <script src="ws.js"></script>
  <script>
    ws.subscribe('/topic/tutor/profile', function (data) {
      if (data) populateTutorProfile(data);
    });

    // ── Session Requests ────────────────────────────────────────
    const requests = {};   // keyed by requestId

    const tutorId = new URLSearchParams(window.location.search).get('id');
    if (tutorId) {
      ws.subscribe('/topic/link/' + tutorId, function (data) {
        if (!data) return;
        const req = typeof data === 'string' ? JSON.parse(data) : data;
        if (!req.requestId) req.requestId = Date.now() + '-' + Math.random().toString(36).slice(2);
        req.status = req.status || 'pending';
        requests[req.requestId] = req;
        renderRequests();
      });
    }

    function renderRequests() {
      const list  = document.getElementById('requests-list');
      const empty = document.getElementById('requests-empty');
      const all   = Object.values(requests);
      empty.style.display = all.length === 0 ? 'block' : 'none';
      list.innerHTML = '';

      all.sort((a, b) => (b.requestId > a.requestId ? 1 : -1)).forEach(req => {
        const isPending = req.status === 'pending';
        const badgeClass = { pending: 'badge-pending', accepted: 'badge-accepted', rejected: 'badge-rejected' }[req.status] || 'badge-pending';

        const card = document.createElement('div');
        card.className = 'request-card card';
        card.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">
            <strong style="font-size:1rem;">${escHtml(req.subject || 'No subject')}</strong>
            <span class="badge ${badgeClass}">${req.status}</span>
          </div>
          <div class="request-meta">
            <span>&#128100; ${escHtml(req.studentName || 'Student')}</span>
            ${req.date ? `<span>&#128197; ${escHtml(req.date)}</span>` : ''}
            ${req.time ? `<span>&#128336; ${escHtml(req.time)}</span>` : ''}
          </div>
          ${req.details  ? `<p class="text-sm"><strong>Details:</strong> ${escHtml(req.details)}</p>`  : ''}
          ${req.message  ? `<p class="text-sm"><strong>Message:</strong> ${escHtml(req.message)}</p>` : ''}
          ${isPending ? `
          <div style="display:flex; gap:0.75rem; margin-top:0.25rem;">
            <button class="btn btn-primary btn-sm"  onclick="respondToRequest('${req.requestId}', 'accepted')">Accept</button>
            <button class="btn btn-outline btn-sm"  onclick="respondToRequest('${req.requestId}', 'rejected')">Reject</button>
          </div>` : ''}
        `;
        list.appendChild(card);
      });
    }

    function respondToRequest(requestId, status) {
      if (!requests[requestId]) return;
      requests[requestId].status = status;

      ws.send('/app/' + (status === 'accepted' ? 'acceptLink' : 'rejectLink'), {},
        JSON.stringify({ requestId, tutorId })
      );

      renderRequests();
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Inline edit helpers ────────────────────────────────────
    function makeEditable(id, apiField) {
      const el = document.getElementById(id);
      const original = el.textContent;
      const raw = apiField === 'availability' && el.dataset.rawAvailability ? el.dataset.rawAvailability : original;
      const input = document.createElement('input');
      input.type = 'text';
      input.value = raw;
      input.className = 'form-control';
      input.style.marginBottom = '0.4rem';
      el.replaceWith(input);
      input.focus();
      input.addEventListener('blur', () => {
        const p = document.createElement('p');
        p.id = id;
        p.dataset.field = apiField;
        p.textContent = input.value || original;
        if (apiField === 'availability') {
          p.dataset.rawAvailability = input.value || '';
        }
        input.replaceWith(p);
        // TODO: PATCH /api/tutors/{tutorId}  body: { [apiField]: input.value }
      });
    }

    function editBio()          { makeEditable('bio-text', 'bio'); }
    function editSubjects()     { makeEditable('subjects-text', 'courses'); }
    function editAvailability() { makeEditable('availability-text', 'availability'); }

    function formatAvailability(value) {
      if (!value) return null;

      let availability = value;
      if (typeof value === 'string') {
        try {
          availability = JSON.parse(value);
        } catch (err) {
          return value;
        }
      }

      if (!availability || typeof availability !== 'object' || !availability.Dates) {
        return typeof value === 'string' ? value : null;
      }

      const dayOrder = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
      const entries = Object.entries(availability.Dates)
        .filter(([, windows]) => Array.isArray(windows) && windows.length > 0)
        .sort((a, b) => dayOrder.indexOf(a[0]) - dayOrder.indexOf(b[0]));

      if (!entries.length) return null;

      const formatTime = (hours) => {
        const h = Math.floor(hours);
        const m = Math.round((hours - h) * 60);
        const period = h >= 12 ? 'pm' : 'am';
        const hour12 = h % 12 === 0 ? 12 : h % 12;
        if (m === 0) return `${hour12}${period}`;
        return `${hour12}:${m.toString().padStart(2, '0')}${period}`;
      };

      return entries.map(([day, windows]) => {
        const ranges = windows
          .filter(Array.isArray)
          .map(([start, end]) => `${formatTime(start)}–${formatTime(end)}`)
          .join(', ');
        return ranges ? `${day}: ${ranges}` : null;
      }).filter(Boolean).join('; ');
    }

    // ── Template: populate page from API data ─────────────────
    // Usage: populateTutorProfile({ name, bio, courses, availability, rating, numRatings, profilePhotoUrl })
    function populateTutorProfile(tutor) {
      document.querySelector('[data-field="profilePhoto"]').src = tutor.profilePhotoUrl || '';
      document.getElementById('bio-text').textContent          = tutor.bio || '';
      document.getElementById('subjects-text').textContent     = (tutor.courses || []).join(', ');
      const availabilityText = formatAvailability(tutor.availability) || 'No current availability';
      const availabilityEl = document.getElementById('availability-text');
      availabilityEl.textContent = availabilityText;
      availabilityEl.dataset.rawAvailability = tutor.availability || '';
      document.getElementById('aura-display').textContent = renderAura(tutor.rating);
      document.querySelector('[data-field="auraCount"]').textContent = 'aura';
    }

    function renderAura(rating) {
      if (!rating) return '✨ 0';
      return '✨ ' + Math.round(rating * 200);
    }
  </script>

</body>
</html>
