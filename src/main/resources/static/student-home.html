<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>tclhs — Student Home</title>
  <link rel="stylesheet" href="theme.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body class="dash-page">

  <header class="dash-header">
    <a href="index.html" class="logo">tclhs</a>
    <nav>
      <a href="browse-tutors.html">Browse Tutors</a>
      <a href="student-home.html" class="active">My Tutors</a>
      <a href="#" onclick="signOut(event)">Log out</a>
    </nav>
  </header>

  <main class="dash-main">
    <h1 class="page-title">student home page</h1>

    <!-- DATA: studentProfile -->
    <div class="flex items-center gap-2 mb-3">
      <!-- Replace src with actual profile photo URL: DATA: student.profilePhotoUrl -->
      <img
        id="profilePic"
        src="https://via.placeholder.com/90"
        alt="Profile photo"
        class="avatar"
        data-field="profilePhoto"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
      />
      <div id="avatarPlaceholder" class="avatar-placeholder" style="display:none;">&#128100;</div>
      <div>
        <!-- DATA: student.firstName + student.lastName -->
        <div id="studentName" class="font-bold" data-field="studentName">[Student Name]</div>
        <!-- DATA: student.gradeLevel -->
        <div id="gradeLevel" class="text-sm text-muted" data-field="gradeLevel">Grade [X]</div>
        <div id="pronouns" class="text-sm text-muted" data-field="pronouns">[Pronouns]</div>
        <div id="bio" class="text-sm text-muted" data-field="bio">[Bio]</div>
        <div id="subjects" class="text-sm text-muted" data-field="subjects">[Subjects]</div>
      </div>
    </div>

    <div class="card">
      <table class="data-table" id="tutors-table">
        <thead>
          <tr>
            <th>Tutor</th>
            <th>Subject</th>
            <th>Status</th>
            <th>Review</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tutors-tbody">
          <!-- DATA: student.tutors — repeat row for each matched tutor -->
          <tr data-tutor-id="1">
            <td data-field="tutorName">Mr. White</td>
            <td data-field="subject">Chemistry</td>
            <td>
              <span class="badge badge-active" data-field="status">Active</span>
            </td>
            <td data-field="review" style="font-style:italic; color:var(--text-muted);">"very good teacher"</td>
            <td>
              <button class="btn btn-sm btn-danger" onclick="removeTutor(this)" title="Remove">✕</button>
            </td>
          </tr>
          <tr data-tutor-id="2">
            <td data-field="tutorName">Ms. Rachel</td>
            <td data-field="subject">Teaching</td>
            <td>
              <span class="badge badge-inactive" data-field="status">Inactive</span>
            </td>
            <td data-field="review" style="font-style:italic; color:var(--text-muted);">"Helped me pass my test"</td>
            <td>
              <button class="btn btn-sm btn-danger" onclick="removeTutor(this)" title="Remove">✕</button>
            </td>
          </tr>
          <!-- END DATA: student.tutors -->
        </tbody>
      </table>

      <div class="mt-2">
        <!-- Links to browse-tutors page to add more -->
        <a href="browse-tutors.html" class="link">+ ADD MORE</a>
      </div>
    </div>
  </main>

  <script>
    let stompClient = null;

    function connect() {
      const socket = new SockJS('/ws');
      socket.onclose = function () {
        document.body.innerHTML = '';
        const message = document.createElement('div');
        message.textContent = '503: Whoops! Lost connection to the server. Please refresh to try again.';
        message.style.fontSize = '24px';
        message.style.color = 'red';
        message.style.textAlign = 'center';
        message.style.marginTop = '20%';
        document.body.style.background = 'none';
        document.body.appendChild(message);
      };
      stompClient = Stomp.over(socket);
      stompClient.connect({}, function () {
        stompClient.subscribe('/topic/student/tutors', function (data) {
          const tutors = JSON.parse(data.body);
          if (Array.isArray(tutors)) populateTutors(tutors);
        });
        stompClient.send('/app/getStudentTutors', {}, {});
      });
    }

    window.addEventListener('load', function () { connect(); });

  function signOut(event) {
    if (event) event.preventDefault();
    localStorage.removeItem('tclhsUserId');
    window.location.href = 'login.html';
  }

  window.addEventListener('DOMContentLoaded', function () {
    const userId = localStorage.getItem('tclhsUserId');
    if (!userId) {
      window.location.href = 'login.html';
      return;
    }

    // Load and display profile data
    loadProfileData(userId);
  });

  async function loadProfileData(userId) {
    try {
      const res = await fetch('/api/account/' + userId);
      if (!res.ok) {
        console.error('Failed to load profile data');
        return;
      }
      const account = await res.json();

      // Update profile picture
      const profilePicEl = document.getElementById('profilePic');
      if (account.profilePic) {
        profilePicEl.src = account.profilePic;
        profilePicEl.style.display = 'block';
        document.getElementById('avatarPlaceholder').style.display = 'none';
      } else {
        profilePicEl.style.display = 'none';
        document.getElementById('avatarPlaceholder').style.display = 'flex';
      }

      // Update name and grade level
      document.getElementById('studentName').textContent = account.name || '[Student Name]';
      document.getElementById('gradeLevel').textContent = 'Grade ' + (account.gradeLevel || '[X]');
      document.getElementById('pronouns').textContent = account.pronouns || '';
      document.getElementById('bio').textContent = "\"" + account.bio + "\"";
      document.getElementById('subjects').textContent = account.subjects ? account.subjects.join(', ') : '[Subjects]';
    } catch (error) {
      console.error('Error loading profile data:', error);
    }
  }

    // Remove a tutor row from the student's list
    function removeTutor(btn) {
      const row = btn.closest('tr');
      const tutorId = row.dataset.tutorId;
      // TODO: call DELETE /api/students/{studentId}/tutors/{tutorId}
      row.remove();
    }

    // Template: populate tutor rows from API data
    // Usage: populateTutors([ { id, name, subject, status, review } ])
    function populateTutors(tutors) {
      const tbody = document.getElementById('tutors-tbody');
      tbody.innerHTML = tutors.map(t => `
        <tr data-tutor-id="${t.id}">
          <td data-field="tutorName">${t.name}</td>
          <td data-field="subject">${t.subject}</td>
          <td><span class="badge badge-${t.status.toLowerCase()}" data-field="status">${t.status}</span></td>
          <td data-field="review" style="font-style:italic;color:var(--text-muted);">"${t.review}"</td>
          <td><button class="btn btn-sm btn-danger" onclick="removeTutor(this)" title="Remove">✕</button></td>
        </tr>
      `).join('');
    }

    async function redirectIfNotSignedIn() {
  const userId = localStorage.getItem('tclhsUserId');
  if (!userId) return;

  try {
    const res = await fetch('/api/account/' + userId);
    if (!res.ok) return;
    const body = await res.json();
    if (!(body && body.name && body.gradeLevel)) {
      window.location.href = 'index.html';
    } else {
      
    }
  } catch (error) {
    console.warn('Unable to verify signed-in user', error);
  }
}

window.addEventListener('DOMContentLoaded', redirectIfNotSignedIn);



  </script>

</body>
</html>
