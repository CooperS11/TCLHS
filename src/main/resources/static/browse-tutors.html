<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>tclhs — Browse Tutors</title>
  <link rel="stylesheet" href="theme.css"/>


<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>




</head>
<body class="dash-page">

  <header class="dash-header">
    <a href="index.html" class="logo">tclhs</a>
    <nav>
      <a href="browse-tutors.html" class="active">Browse Tutors</a>
      <a href="student-home.html">My Tutors</a>
      <a href="login.html">Log out</a>
    </nav>
  </header>

  <main class="dash-main">
    <h1 class="page-title">tutors</h1>

    <div class="card">
      <table class="data-table" id="tutors-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Available Time</th>
            <th>Strong Subjects</th>
            <th>Aura</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tutors-tbody">
          <!-- DATA: tutors list — repeat row for each tutor -->
          <tr data-tutor-id="1">
            <td data-field="name">Owen</td>
            <td data-field="availability">3–4 on Mondays</td>
            <td data-field="subjects">Coding, CAD</td>
            <td>
              <span data-field="aura">✨ 1000</span>
            </td>
            <td>
              <a href="view-tutor.html?id=1" class="btn btn-outline btn-sm">View More</a>
            </td>
          </tr>
          <tr data-tutor-id="2">
            <td data-field="name">[Tutor Name]</td>
            <td data-field="availability">[Availability]</td>
            <td data-field="subjects">[Subjects]</td>
            <td>
              <span data-field="aura">✨ 0</span>
            </td>
            <td>
              <a href="view-tutor.html?id=2" class="btn btn-outline btn-sm">View More</a>
            </td>
          </tr>
          <tr data-tutor-id="3">
            <td data-field="name">[Tutor Name]</td>
            <td data-field="availability">[Availability]</td>
            <td data-field="subjects">[Subjects]</td>
            <td>
              <span data-field="aura">✨ 0</span>
            </td>
            <td>
              <a href="view-tutor.html?id=3" class="btn btn-outline btn-sm">View More</a>
            </td>
          </tr>
          <!-- END DATA: tutors list -->
        </tbody>
      </table>
    </div>
  </main>

  <script>


let stompClient = null;

function connect() {
    const socket = new SockJS('/ws');

 socket.onclose = function(event) {
        document.body.innerHTML = '';
        const message = document.createElement('div');
        message.textContent = "503: Whoops! Lost connection to the server. Please refresh to try again.";
        message.style.fontSize = '24px';
        message.style.color = 'red';
        message.style.textAlign = 'center';
        message.style.marginTop = '20%';
        document.body.style.background = 'none';
        document.body.appendChild(message);
    };


    stompClient = Stomp.over(socket);


    


    stompClient.connect({}, function (frame) {
        
        setInterval(() => {
            if (stompClient && stompClient.connected) {
                stompClient.send("/app/getTutors", {}, {});
            }
        }, 500);


      stompClient.subscribe('/topic/tutors', function (data) {
          const tutors = JSON.parse(data.body);
          populateTutors(tutors);
        });
      });
}
window.addEventListener('load', function() {
    connect();
});
  </script>
  <script>

    function formatAvailability(value) {
      if (!value) return null;

      let availability = value;
      if (typeof value === 'string') {
        try {
          availability = JSON.parse(value);
        } catch (err) {
          return value;
        }
      }

      if (!availability || typeof availability !== 'object' || !availability.Dates) {
        return typeof value === 'string' ? value : null;
      }

      const dayOrder = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
      const entries = Object.entries(availability.Dates)
        .filter(([, windows]) => Array.isArray(windows) && windows.length > 0)
        .sort((a, b) => dayOrder.indexOf(a[0]) - dayOrder.indexOf(b[0]));

      if (!entries.length) return null;

      const formatTime = (hours) => {
        const h = Math.floor(hours);
        const m = Math.round((hours - h) * 60);
        const period = h >= 12 ? 'pm' : 'am';
        const hour12 = h % 12 === 0 ? 12 : h % 12;
        if (m === 0) return `${hour12}${period}`;
        return `${hour12}:${m.toString().padStart(2, '0')}${period}`;
      };

      return entries.map(([day, windows]) => {
        const ranges = windows
          .filter(Array.isArray)
          .map(([start, end]) => `${formatTime(start)}–${formatTime(end)}`)
          .join(', ');
        return ranges ? `${day}: ${ranges}` : null;
      }).filter(Boolean).join('; ');
    }

    // Template: populate tutor rows from API data
    // Usage: populateTutors([ { id, name, availability, courses, rating, numRatings } ])
    function populateTutors(tutors) {
      const tbody = document.getElementById('tutors-tbody');
      tbody.innerHTML = tutors.map(t => `
        <tr data-tutor-id="${t.id}">
          <td data-field="name">${t.name}</td>
          <td data-field="availability">${formatAvailability(t.availability) || '—'}</td>
          <td data-field="subjects">${(t.courses || []).join(', ')}</td>
          <td>
            <span data-field="aura">${renderAura(t.rating)}</span>
          </td>
          <td>
            <a href="view-tutor.html?id=${t.id}" class="btn btn-outline btn-sm">View More</a>
          </td>
        </tr>
      `).join('');
    }

    function renderAura(rating) {
      if (!rating) return '✨ 0';
      return '✨ ' + Math.round(rating * 200);
    }
  </script>

</body>
</html>
